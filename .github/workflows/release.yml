name: Release

# Only triggered when a version tag is pushed (e.g., v1.0.0, v2.1.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Build on each OS
  # ──────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Step 2: Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List Downloaded Files
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | head -50
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v6
        with:
          tag_name: ${{ github.ref_name }}
          name: "Happy Tycoon Launcher ${{ github.ref_name }}"
          body: |
            ## Happy Tycoon Launcher ${{ github.ref_name }}

            ### 다운로드
            - **Windows**: `HappyTycoonLauncher-setup-*.exe`
            - **macOS**: `HappyTycoonLauncher-setup-*.dmg`
            - **Linux**: `HappyTycoonLauncher-setup-*.AppImage`
          draft: false
          prerelease: false
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.yaml
            artifacts/*.blockmap
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
