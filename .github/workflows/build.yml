name: Build & Release

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────
  # 1. Build on each platform & upload artifacts
  # ──────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/*.tar.gz
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # 2. Create Tag & GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Download all build artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Tag & GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Happy Tycoon Launcher ${{ steps.version.outputs.tag }}
          body: |
            ## Happy Tycoon Launcher ${{ steps.version.outputs.tag }}

            이 릴리즈는 커밋 `${{ github.sha }}` 에서 자동으로 생성되었습니다.

            ### 다운로드
            - **Windows**: `.exe` 파일을 다운로드하세요.
            - **macOS**: `.dmg` 파일을 다운로드하세요.
            - **Linux**: `.AppImage` 또는 `.deb` 파일을 다운로드하세요.
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}